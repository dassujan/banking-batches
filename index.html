<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Loop Timer</title>
    <link rel="icon" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: #111118;
            --border: #1e1e2e;
            --accent: #e8ff47;
            --accent2: #ff6b35;
            --accent3: #5bf5c8;
            --text: #f0f0f0;
            --muted: #555570;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(232, 255, 71, .03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(232, 255, 71, .03) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        /* ── SETUP ── */
        #setup {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #setup.gone {
            display: none;
        }

        h1 {
            font-family: 'Bebas Neue';
            font-size: 52px;
            letter-spacing: .12em;
            color: #ff4747;
            text-align: center;
            line-height: 1;
        }

        .sub {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: .25em;
            text-transform: uppercase;
            text-align: center;
            margin-top: 2px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 22px 20px;
        }

        .lbl {
            font-size: 10px;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
            display: block;
        }

        /* time inputs */
        .time-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .time-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .time-col span {
            font-size: 9px;
            letter-spacing: .22em;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        input[type=number] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Bebas Neue';
            font-size: 42px;
            text-align: center;
            padding: 8px 4px;
            outline: none;
            -moz-appearance: textfield;
            touch-action: manipulation;
        }

        input[type=number]:focus {
            border-color: var(--accent);
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        .colon {
            font-family: 'Bebas Neue';
            font-size: 32px;
            color: var(--muted);
            padding-bottom: 18px;
        }

        /* music grid */
        .music-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .mopt {
            padding: 12px 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--muted);
            font-family: 'DM Mono';
            font-size: 10px;
            letter-spacing: .12em;
            text-transform: uppercase;
            cursor: pointer;
            text-align: center;
            line-height: 1.6;
            touch-action: manipulation;
            transition: all .15s;
        }

        .mopt .ico {
            font-size: 20px;
            display: block;
            margin-bottom: 2px;
        }

        .mopt.on {
            border-color: var(--accent3);
            color: var(--accent3);
            background: rgba(91, 245, 200, .07);
        }

        /* start button */
        #startBtn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #0a0a0f;
            border: none;
            border-radius: 4px;
            font-family: 'Bebas Neue';
            font-size: 22px;
            letter-spacing: .15em;
            cursor: pointer;
            touch-action: manipulation;
            transition: opacity .15s;
        }

        #startBtn:active {
            opacity: .8;
        }

        /* ── TIMER ── */
        #timer {
            width: 100%;
            max-width: 380px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        #timer.show {
            display: flex;
        }

        /* ring */
        .ring-wrap {
            position: relative;
            width: 260px;
            height: 260px;
        }

        .ring-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: var(--border);
            stroke-width: 7;
        }

        .ring-fg {
            fill: none;
            stroke: var(--accent);
            stroke-width: 7;
            stroke-linecap: butt;
            transition: stroke-dashoffset 1s linear, stroke .4s;
        }

        .ring-inner {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #timeDisplay {
            font-family: 'Bebas Neue';
            font-size: 54px;
            letter-spacing: .04em;
            color: var(--text);
            line-height: 1;
        }

        .rlbl {
            font-size: 9px;
            letter-spacing: .3em;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 2px;
        }

        #mbadge {
            font-size: 9px;
            letter-spacing: .18em;
            color: var(--accent3);
            text-transform: uppercase;
            margin-top: 5px;
        }

        #loopLine {
            font-size: 11px;
            letter-spacing: .18em;
            color: var(--muted);
            text-transform: uppercase;
        }

        #loopLine b {
            color: var(--accent);
        }

        /* status */
        .sbar {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            letter-spacing: .2em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            animation: blink 1s infinite;
        }

        .dot.red {
            background: var(--accent2);
            animation: blink .25s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .15
            }
        }

        /* volume */
        .vol-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .vbtn {
            font-size: 18px;
            background: none;
            border: none;
            cursor: pointer;
            touch-action: manipulation;
        }

        .vlbl {
            font-size: 10px;
            color: var(--muted);
            min-width: 34px;
        }

        /* control buttons */
        .btns {
            display: flex;
            gap: 12px;
        }

        .cbtn {
            padding: 11px 26px;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: 'DM Mono';
            font-size: 11px;
            letter-spacing: .18em;
            text-transform: uppercase;
            cursor: pointer;
            touch-action: manipulation;
            transition: all .15s;
        }

        .cbtn:active {
            opacity: .7;
        }

        .cbtn.red:active {
            border-color: var(--accent2);
            color: var(--accent2);
        }

        /* flash overlay */
        #flash {
            position: fixed;
            inset: 0;
            background: var(--accent2);
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        #flash.pop {
            animation: flashpop .5s ease-out forwards;
        }

        @keyframes flashpop {
            0% {
                opacity: .25
            }

            100% {
                opacity: 0
            }
        }

        /* top banner */
        #banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--accent2);
            color: #fff;
            font-family: 'Bebas Neue';
            font-size: 22px;
            letter-spacing: .15em;
            text-align: center;
            padding: 14px;
            transform: translateY(-100%);
            transition: transform .35s cubic-bezier(.34, 1.56, .64, 1);
            z-index: 101;
        }

        #banner.show {
            transform: translateY(0);
        }

        @media(max-width:400px) {
            .ring-wrap {
                width: 220px;
                height: 220px;
            }

            #timeDisplay {
                font-size: 44px;
            }

            input[type=number] {
                font-size: 36px;
            }
        }
    </style>
</head>

<body>

    <div id="flash"></div>
    <div id="banner">⏰ LOOP 1 DONE!</div>

    <!-- SETUP SCREEN -->
    <div id="setup">
        <div>
            <h1>LOOP TIMER</h1>
            <p class="sub">repeats until you close</p>
        </div>

        <div class="card">
            <span class="lbl">Set Duration</span>
            <div class="time-row">
                <div class="time-col">
                    <input type="number" id="hh" value="0" min="0" max="99" inputmode="numeric">
                    <span>hrs</span>
                </div>
                <div class="colon">:</div>
                <div class="time-col">
                    <input type="number" id="mm" value="0" min="0" max="59" inputmode="numeric">
                    <span>min</span>
                </div>
                <div class="colon">:</div>
                <div class="time-col">
                    <input type="number" id="ss" value="0" min="0" max="59" inputmode="numeric">
                    <span>sec</span>
                </div>
            </div>
        </div>

        <div class="card">
            <span class="lbl">Alarm Sound</span>
            <div class="music-grid">
                <button class="mopt on" data-m="edm"><span class="ico">⚡</span>EDM Pulse</button>
                <button class="mopt" data-m="epic"><span class="ico">🎺</span>Epic Fanfare</button>
                <button class="mopt" data-m="siren"><span class="ico">🚨</span>War Siren</button>
                <button class="mopt" data-m="digital"><span class="ico">🎮</span>Digital Boss</button>
            </div>
        </div>

        <button id="startBtn">▶ START LOOP</button>
    </div>

    <!-- TIMER SCREEN -->
    <div id="timer">
        <div class="ring-wrap">
            <svg class="ring-svg" viewBox="0 0 260 260">
                <circle class="ring-bg" cx="130" cy="130" r="118" />
                <circle class="ring-fg" id="ringFg" cx="130" cy="130" r="118" />
            </svg>
            <div class="ring-inner">
                <div id="timeDisplay">00:00:00</div>
                <div class="rlbl">remaining</div>
                <div id="mbadge">⚡ EDM PULSE</div>
            </div>
        </div>

        <div id="loopLine">Loop <b id="loopNum">1</b> — <b id="intLbl">—</b></div>

        <div class="sbar">
            <div class="dot" id="dot"></div>
            <span id="statusTxt">running</span>
        </div>

        <div class="vol-row">
            <button class="vbtn" id="muteBtn">🔔</button>
            <input type="range" id="volSlider" min="0" max="100" value="80">
            <span class="vlbl" id="volLbl">80%</span>
        </div>

        <div class="btns">
            <button class="cbtn" id="pauseBtn">Pause</button>
            <button class="cbtn red" id="resetBtn">Reset</button>
        </div>
    </div>

    <script>
        // ─────────────────────────────────────────────
        // STATE
        // ─────────────────────────────────────────────
        var total = 0, left = 0, loop = 1;
        var paused = false, alarming = false;
        var tid = null;          // setInterval id
        var endTime = 0;         // absolute ms when current interval ends
        var music = 'edm';

        var C = 2 * Math.PI * 118;
        var fg = document.getElementById('ringFg');
        fg.style.strokeDasharray = C;
        fg.style.strokeDashoffset = 0;

        var mnames = { edm: '⚡ EDM PULSE', epic: '🎺 EPIC FANFARE', siren: '🚨 WAR SIREN', digital: '🎮 DIGITAL BOSS' };

        // ─────────────────────────────────────────────
        // MUSIC SELECT
        // ─────────────────────────────────────────────
        document.querySelectorAll('.mopt').forEach(function (b) {
            b.addEventListener('click', function () {
                document.querySelectorAll('.mopt').forEach(function (x) { x.classList.remove('on'); });
                b.classList.add('on');
                music = b.getAttribute('data-m');
            });
        });

        // ─────────────────────────────────────────────
        // AUDIO — created ONLY inside user tap
        // ─────────────────────────────────────────────
        var AC = null, MG = null, nodes = [];
        var vol = 0.8, muted = false;

        function initAC() {
            // Already created
            if (AC) {
                if (AC.state === 'suspended') AC.resume();
                return;
            }
            try {
                AC = new (window.AudioContext || window.webkitAudioContext)();
                MG = AC.createGain();
                MG.gain.value = vol;
                MG.connect(AC.destination);
                // *** iOS/Android unlock: silent buffer played synchronously in tap ***
                var b = AC.createBuffer(1, 1, 22050);
                var s = AC.createBufferSource();
                s.buffer = b;
                s.connect(AC.destination);
                s.start(0);
            } catch (e) { console.warn(e); }
        }

        function setVol(v) {
            vol = v / 100;
            document.getElementById('volLbl').textContent = v + '%';
            if (MG && !muted) MG.gain.value = vol;
        }
        document.getElementById('volSlider').addEventListener('input', function () {
            setVol(this.value);
        });
        document.getElementById('muteBtn').addEventListener('click', function () {
            muted = !muted;
            this.textContent = muted ? '🔕' : '🔔';
            if (MG) MG.gain.value = muted ? 0 : vol;
        });

        function killNodes() {
            nodes.forEach(function (n) { try { n.stop(); } catch (e) { } });
            nodes = [];
        }
        function osc(t, f) { var o = AC.createOscillator(); o.type = t; o.frequency.value = f; nodes.push(o); return o; }
        function gain(v) { var g = AC.createGain(); g.gain.value = v; return g; }
        function noise(d) {
            var b = AC.createBuffer(1, AC.sampleRate * d, AC.sampleRate);
            var arr = b.getChannelData(0);
            for (var i = 0; i < arr.length; i++) arr[i] = Math.random() * 2 - 1;
            var s = AC.createBufferSource(); s.buffer = b; nodes.push(s); return s;
        }

        function playEdm(n) {
            var dur = 4;
            [0, .5, 1, 1.5, 2, 2.5, 3, 3.5].forEach(function (t) {
                var o = osc('sine', 180), g = gain(0); o.connect(g); g.connect(MG);
                o.frequency.exponentialRampToValueAtTime(35, n + t + .2);
                g.gain.setValueAtTime(1.1, n + t); g.gain.exponentialRampToValueAtTime(.001, n + t + .25);
                o.start(n + t); o.stop(n + t + .3);
            });
            var sir = osc('sawtooth', 660), sg = gain(0); sir.connect(sg); sg.connect(MG);
            [0, .5, 1, 1.5, 2, 2.5, 3, 3.5].forEach(function (t, i) { sir.frequency.setValueAtTime(i % 2 ? 990 : 660, n + t); });
            sg.gain.setValueAtTime(0, n); sg.gain.linearRampToValueAtTime(.3, n + .05);
            sg.gain.setValueAtTime(.3, n + 3.6); sg.gain.linearRampToValueAtTime(0, n + dur);
            sir.start(n); sir.stop(n + dur);
            [[0, 523, 659, 784], [.25, 587, 740, 880], [.75, 523, 659, 784], [1.25, 587, 740, 880],
            [1.75, 523, 659, 784], [2.25, 659, 830, 988], [2.75, 523, 659, 784], [3.25, 698, 880, 1047]].forEach(function (row) {
                var t = row[0];
                for (var i = 1; i < row.length; i++) {
                    var o = osc('square', row[i]), flt = AC.createBiquadFilter(), g = gain(0);
                    flt.type = 'bandpass'; flt.frequency.value = row[i]; flt.Q.value = 2;
                    o.connect(flt); flt.connect(g); g.connect(MG);
                    g.gain.setValueAtTime(.16, n + t); g.gain.exponentialRampToValueAtTime(.001, n + t + .22);
                    o.start(n + t); o.stop(n + t + .25);
                }
            });
            [.25, .75, 1.25, 1.75, 2.25, 2.75, 3.25].forEach(function (t) {
                var no = noise(.14), flt = AC.createBiquadFilter(), g = gain(0);
                flt.type = 'highpass'; flt.frequency.value = 1800; no.connect(flt); flt.connect(g); g.connect(MG);
                g.gain.setValueAtTime(.55, n + t); g.gain.exponentialRampToValueAtTime(.001, n + t + .12);
                no.start(n + t); no.stop(n + t + .16);
            });
        }
        function playEpic(n) {
            var dur = 4.5;
            [0, .65, 1.3, 2, 2.65, 3.3, 3.9].forEach(function (t) {
                var o = osc('sine', 120), g = gain(0); o.connect(g); g.connect(MG);
                o.frequency.exponentialRampToValueAtTime(28, n + t + .45);
                g.gain.setValueAtTime(1.5, n + t); g.gain.exponentialRampToValueAtTime(.001, n + t + .55);
                o.start(n + t); o.stop(n + t + .6);
            });
            [[0, [165, 208, 247]], [.65, [175, 220, 262]], [1.3, [196, 247, 294]], [2, [220, 277, 330]],
            [2.65, [175, 220, 262]], [3.3, [220, 277, 330]], [3.9, [262, 330, 392]]].forEach(function (row) {
                row[1].forEach(function (f) {
                    var o = osc('sawtooth', f), flt = AC.createBiquadFilter(), g = gain(0);
                    flt.type = 'lowpass'; flt.frequency.value = 900; flt.Q.value = 3;
                    o.connect(flt); flt.connect(g); g.connect(MG);
                    g.gain.setValueAtTime(0, n + row[0]); g.gain.linearRampToValueAtTime(.32, n + row[0] + .04);
                    g.gain.setValueAtTime(.3, n + row[0] + .3); g.gain.exponentialRampToValueAtTime(.001, n + row[0] + .6);
                    o.start(n + row[0]); o.stop(n + row[0] + .65);
                });
            });
            [0, 1.3, 2.65, 3.9].forEach(function (t) {
                var no = noise(.7), flt = AC.createBiquadFilter(), g = gain(0);
                flt.type = 'highpass'; flt.frequency.value = 5000; no.connect(flt); flt.connect(g); g.connect(MG);
                g.gain.setValueAtTime(.5, n + t); g.gain.exponentialRampToValueAtTime(.001, n + t + .7);
                no.start(n + t); no.stop(n + t + .75);
            });
        }
        function playSiren(n) {
            var dur = 4;
            for (var i = 0; i < 8; i++) {
                var t = i * .5, o = osc('sawtooth', 440 + (i % 2) * 220), flt = AC.createBiquadFilter(), g = gain(0);
                flt.type = 'peaking'; flt.frequency.value = 800; flt.gain.value = 18;
                o.connect(flt); flt.connect(g); g.connect(MG);
                g.gain.setValueAtTime(0, n + t); g.gain.linearRampToValueAtTime(.42, n + t + .02);
                g.gain.setValueAtTime(.42, n + t + .22); g.gain.linearRampToValueAtTime(0, n + t + .48);
                o.start(n + t); o.stop(n + t + .5);
            }
            [0, .5, 1, 1.5, 2, 2.5, 3, 3.5].forEach(function (t, i) {
                var o = osc('sine', i % 2 ? 69 : 52), g = gain(0); o.connect(g); g.connect(MG);
                g.gain.setValueAtTime(1.4, n + t); g.gain.exponentialRampToValueAtTime(.001, n + t + .42);
                o.start(n + t); o.stop(n + t + .45);
            });
            var mod = osc('sine', 9), car = osc('square', 330), mg = gain(160), cg = gain(0);
            mod.connect(mg); mg.connect(car.frequency); car.connect(cg); cg.connect(MG);
            cg.gain.linearRampToValueAtTime(.3, n + .1); cg.gain.setValueAtTime(.3, n + 3.6); cg.gain.linearRampToValueAtTime(0, n + dur);
            mod.start(n); mod.stop(n + dur); car.start(n); car.stop(n + dur);
        }
        function playDigital(n) {
            var dur = 4.5;
            [262, 330, 392, 494, 523, 659, 784, 988, 1047, 988, 784, 659, 523, 494, 392, 330].forEach(function (f, i) {
                var t = i * .11, o = osc('square', f), g = gain(0); o.connect(g); g.connect(MG);
                g.gain.setValueAtTime(.22, n + t); g.gain.exponentialRampToValueAtTime(.001, n + t + .09);
                o.start(n + t); o.stop(n + t + .11);
            });
            [[1.8, [147, 185, 220]], [2.15, [165, 208, 247]], [2.5, [185, 233, 277]], [2.85, [220, 277, 330]],
            [3.2, [196, 247, 294]], [3.55, [220, 277, 330]]].forEach(function (row) {
                row[1].forEach(function (f) {
                    var o = osc('square', f), flt = AC.createBiquadFilter(), g = gain(0);
                    flt.type = 'lowpass'; flt.frequency.value = 2200;
                    o.connect(flt); flt.connect(g); g.connect(MG);
                    g.gain.setValueAtTime(.38, n + row[0]); g.gain.exponentialRampToValueAtTime(.001, n + row[0] + .32);
                    o.start(n + row[0]); o.stop(n + row[0] + .35);
                });
            });
            [131, 165, 196, 262].forEach(function (f) {
                var o = osc('square', f), g = gain(0); o.connect(g); g.connect(MG);
                g.gain.setValueAtTime(0, n + 4.1); g.gain.linearRampToValueAtTime(.45, n + 4.16);
                g.gain.exponentialRampToValueAtTime(.001, n + dur);
                o.start(n + 4.1); o.stop(n + dur + .05);
            });
        }

        function doAlarm() {
            if (!AC || !MG) return;
            killNodes();
            try {
                if (AC.state === 'suspended') AC.resume();
                var n = AC.currentTime + .05;
                if (music === 'edm') playEdm(n);
                else if (music === 'epic') playEpic(n);
                else if (music === 'siren') playSiren(n);
                else playDigital(n);
            } catch (e) { console.warn(e); }
        }

        // ─────────────────────────────────────────────
        // TIMER LOGIC
        // ─────────────────────────────────────────────
        function startTimer() {
            // *** Audio unlock MUST happen here, synchronously, in the click handler ***
            initAC();

            var h = parseInt(document.getElementById('hh').value) || 0;
            var m = parseInt(document.getElementById('mm').value) || 0;
            var s = parseInt(document.getElementById('ss').value) || 0;
            total = h * 3600 + m * 60 + s;
            if (total <= 0) { alert('Please enter a time!'); return; }

            loop = 1; left = total; paused = false; alarming = false;

            var lbl = '';
            if (h) lbl += h + 'h ';
            if (m) lbl += m + 'm ';
            lbl += s + 's';
            document.getElementById('intLbl').innerHTML = '<b>' + lbl.trim() + '</b>';
            document.getElementById('mbadge').textContent = mnames[music];

            document.getElementById('setup').classList.add('gone');
            document.getElementById('timer').classList.add('show');

            renderDisplay();
            beginCountdown();
        }

        function beginCountdown() {
            clearInterval(tid);
            // Record the absolute end time — this is immune to setInterval drift
            endTime = Date.now() + left * 1000;
            tid = setInterval(tick, 500); // poll every 500ms for responsiveness
        }

        function tick() {
            if (paused || alarming) return;

            var now = Date.now();
            left = Math.round((endTime - now) / 1000);

            if (left <= 0) {
                left = 0;
                renderDisplay();
                clearInterval(tid); tid = null;
                fireAlarm();
                return;
            }
            renderDisplay();
        }

        function renderDisplay() {
            var r = Math.max(0, left);
            var h = Math.floor(r / 3600);
            var m = Math.floor((r % 3600) / 60);
            var s = r % 60;
            document.getElementById('timeDisplay').textContent =
                pad(h) + ':' + pad(m) + ':' + pad(s);

            var pct = total > 0 ? r / total : 0;
            fg.style.strokeDashoffset = C * (1 - pct);

            if (pct < .2) {
                fg.style.stroke = 'var(--accent2)';
                document.getElementById('timeDisplay').style.color = 'var(--accent2)';
            } else if (pct < .5) {
                fg.style.stroke = 'var(--accent3)';
                document.getElementById('timeDisplay').style.color = 'var(--text)';
            } else {
                fg.style.stroke = 'var(--accent)';
                document.getElementById('timeDisplay').style.color = 'var(--text)';
            }
            document.getElementById('loopNum').textContent = loop;
        }

        function pad(n) { return String(n).padStart(2, '0'); }

        function fireAlarm() {
            alarming = true;

            // Flash
            var fl = document.getElementById('flash');
            fl.classList.remove('pop'); void fl.offsetWidth; fl.classList.add('pop');

            // Banner
            var bn = document.getElementById('banner');
            bn.textContent = '⏰ LOOP ' + loop + ' DONE!';
            bn.classList.add('show');

            // Status dot
            var dot = document.getElementById('dot');
            dot.classList.add('red');
            document.getElementById('statusTxt').textContent = 'notifying!';

            // Sound
            doAlarm();

            // After 4 seconds → restart
            setTimeout(function () {
                killNodes();
                bn.classList.remove('show');
                dot.classList.remove('red');
                document.getElementById('statusTxt').textContent = 'running';
                loop++;
                left = total;
                alarming = false;
                renderDisplay();
                beginCountdown();
            }, 4000);
        }

        // ─────────────────────────────────────────────
        // CONTROLS
        // ─────────────────────────────────────────────
        document.getElementById('pauseBtn').addEventListener('click', function () {
            if (alarming) return;
            paused = !paused;
            if (paused) {
                // Save how much is left
                left = Math.round((endTime - Date.now()) / 1000);
                this.textContent = 'Resume';
                document.getElementById('statusTxt').textContent = 'paused';
                document.getElementById('dot').style.animationPlayState = 'paused';
                document.getElementById('timeDisplay').style.opacity = '.45';
            } else {
                // Reset end time based on remaining
                endTime = Date.now() + left * 1000;
                this.textContent = 'Pause';
                document.getElementById('statusTxt').textContent = 'running';
                document.getElementById('dot').style.animationPlayState = 'running';
                document.getElementById('timeDisplay').style.opacity = '1';
            }
        });

        document.getElementById('resetBtn').addEventListener('click', function () {
            clearInterval(tid); tid = null;
            killNodes();
            alarming = false; paused = false; loop = 1; left = 0;
            document.getElementById('timer').classList.remove('show');
            document.getElementById('setup').classList.remove('gone');
            document.getElementById('banner').classList.remove('show');
            document.getElementById('dot').classList.remove('red');
            document.getElementById('dot').style.animationPlayState = 'running';
            document.getElementById('statusTxt').textContent = 'running';
            document.getElementById('timeDisplay').style.opacity = '1';
            document.getElementById('timeDisplay').style.color = 'var(--text)';
            document.getElementById('pauseBtn').textContent = 'Pause';
            fg.style.strokeDashoffset = 0;
            fg.style.stroke = 'var(--accent)';
        });

        // Start button
        document.getElementById('startBtn').addEventListener('click', startTimer);

        // Clamp inputs
        document.getElementById('hh').addEventListener('blur', function () { this.value = Math.min(99, Math.max(0, parseInt(this.value) || 0)); });
        document.getElementById('mm').addEventListener('blur', function () { this.value = Math.min(59, Math.max(0, parseInt(this.value) || 0)); });
        document.getElementById('ss').addEventListener('blur', function () { this.value = Math.min(59, Math.max(0, parseInt(this.value) || 0)); });
    </script>
</body>

</html>
